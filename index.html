<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Life of Our Shoes</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
:root {
  --bg:           #000000;
  --surface:      #161612;
  --border:       #271d28;
  --accent:       #2b3180;
  --accent2:      #ffbb00;
  --text:         #8b90d9;
  --muted:        #5c6096;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-mono:    'Inter', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 15px;
  line-height: 1.7;
  overflow-x: hidden;
}

/* ─── HERO ─── */
#hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 4rem 2rem;
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  text-align: center;
}
#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 60%, rgba(200,240,74,0.07) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 30%, rgba(240,168,60,0.06) 0%, transparent 50%);
}
.hero-inner {
  position: relative;
  max-width: 600px;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.eyebrow {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 1.2rem;
  display: block;
}
#hero h1 {
  font-family: var(--font-display);
  font-size: clamp(1.4rem, 3vw, 2.2rem);
  line-height: 1.1;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 1.5rem;
}
#hero h1 em { font-style: italic; color: var(--accent); }
.hero-sub {
  color: var(--accent);
  font-size: 0.95rem;
  max-width: 400px;
  margin-bottom: 2.5rem;
}
.cta-btn {
  display: inline-block;
  padding: 0.75rem 1.8rem;
  border: 1px solid var(--accent);
  color: var(--accent);
  text-decoration: none;
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: background 0.2s, color 0.2s;
}
.cta-btn:hover { background: var(--accent); color: var(--bg); }

.hero-img-stack {
  position: relative;
  width: min(600px, 90vw);
  margin: 1rem 0 2rem;
}
#shoeCanvas {
  display: block;
  width: 90%;
  height: auto;
  margin: 0 auto;
  position: relative;
  z-index: 2;
  filter: drop-shadow(0 20px 60px rgba(18,79,165,0.12));
  animation: float 6s ease-in-out infinite;
}
.hero-grass {
  width: 115%;
  position: absolute;
  bottom: 0;
  left: 0;
  z-index: 1;
  transform: translateX(12.5%) scale(1.3);
  transform-origin: bottom center;
  pointer-events: none;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-18px); }
}
.shoe-hint {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-top: -0.5rem;
  margin-bottom: 1.5rem;
  opacity: 0.7;
}

/* ─── MODAL ─── */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 200;
}
.part-modal {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 201;
  width: min(560px, 90vw);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 2.5rem 2rem 2rem;
}
.modal-close {
  position: absolute;
  top: 1rem; right: 1rem;
  background: none; border: none;
  color: var(--muted);
  font-size: 1.1rem;
  cursor: pointer;
  transition: color 0.2s;
}
.modal-close:hover { color: var(--text); }
.part-modal h2 {
  font-family: var(--font-display);
  font-size: clamp(1.5rem, 4vw, 2rem);
  font-weight: 700;
  color: var(--text);
  margin-bottom: 1rem;
  line-height: 1.2;
}
.part-modal p { color: var(--muted); font-size: 0.9rem; line-height: 1.7; }

/* ─── HORIZONTAL JOURNEY ─── */
#journey {
  height: 600vh;
  position: relative;
}
#journey-sticky {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: hidden;
  border-top: 1px solid var(--border);
}
#journey-track {
  display: flex;
  height: 100%;
  will-change: transform;
}

/* PANELS — full bleed, images fill the whole panel */
.panel {
  flex: 0 0 100vw;
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
  cursor: default;
}

/* Images dropped into a panel should fill it */
.panel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Clickable hotspot areas you can place over images */
.hotspot {
  position: absolute;
  border-radius: 50%;
  width: 36px;
  height: 36px;
  background: rgba(255,187,0,0.15);
  border: 1px solid var(--accent2);
  cursor: pointer;
  transform: translate(-50%, -50%);
  transition: background 0.2s, transform 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hotspot::after {
  content: '+';
  color: var(--accent2);
  font-size: 1.1rem;
  line-height: 1;
}
.hotspot:hover {
  background: rgba(255,187,0,0.3);
  transform: translate(-50%, -50%) scale(1.15);
}

/* Panel label — sits bottom-left over the image */
.panel-label {
  position: absolute;
  bottom: 3rem;
  left: 2.5rem;
  z-index: 5;
  pointer-events: none;
}
.panel-label h2 {
  font-family: var(--font-display);
  font-size: clamp(1.4rem, 2.5vw, 2.2rem);
  font-weight: 700;
  color: #fff;
  line-height: 1.1;
  text-shadow: 0 2px 20px rgba(0,0,0,0.7);
}

.panel-number {
  position: absolute;
  bottom: 1.5rem;
  right: 2rem;
  font-family: var(--font-display);
  font-size: clamp(5rem, 10vw, 9rem);
  font-weight: 700;
  color: rgba(255,255,255,0.06);
  line-height: 1;
  pointer-events: none;
  user-select: none;
  z-index: 2;
}


#journey-dots {
  position: absolute;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 0.75rem;
  z-index: 10;
}
.jdot {
  width: 8px; height: 8px;
  border-radius: 50%;
  border: 1px solid var(--muted);
  background: transparent;
  cursor: pointer;
  padding: 0;
  transition: background 0.3s, border-color 0.3s, transform 0.3s;
}
.jdot.active {
  background: var(--accent);
  border-color: var(--accent);
  transform: scale(1.4);
}
#scroll-nudge {
  position: absolute;
  bottom: 1.4rem;
  right: 2rem;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  opacity: 1;
  transition: opacity 0.6s;
  pointer-events: none;
  z-index: 10;
}
#scroll-nudge.hide { opacity: 0; }


/* MOBILE */
@media (max-width: 700px) {
  #journey { height: auto; }
  #journey-sticky { position: relative; height: auto; overflow: visible; }
  #journey-track { flex-direction: column; transform: none !important; }
  .panel { height: 100vh; }
  .panel::after { display: none; }
  #journey-dots, #scroll-nudge { display: none; }
}
  </style>
</head>
<body>

  <!-- HERO -->
  <section id="hero">
    <div class="hero-inner">
      <p class="eyebrow">Cradle to Grave</p>
      <h1>The Life of Our Shoes</h1>
      <div class="hero-img-stack">
        <canvas id="shoeCanvas"
                aria-label="Interactive shoe diagram — click each part to learn more"></canvas>
        <img src="grasstest.png" alt="" class="hero-grass" />
      </div>
      <p class="shoe-hint">click the shoe to find out more</p>
      <p class="hero-sub">From raw material to landfill and everything inbetween</p>
    </div>
  </section>

  <!-- SHARED MODAL (used by both shoe parts and panel hotspots) -->
  <div id="modalBackdrop" class="modal-backdrop"></div>
  <div id="partModal" class="part-modal">
    <button id="modalClose" class="modal-close" aria-label="Close">&#x2715;</button>
    <h2 id="modalHeading"></h2>
    <p id="modalBody"></p>
  </div>

  <!-- HORIZONTAL JOURNEY -->
  <div id="journey">
    <div id="journey-sticky">
      <div id="journey-track">

        <!-- PANEL 1: Sourcing
             Drop your image inside .panel as an <img> tag.
             Add <div class="hotspot" data-modal="s1" style="left:40%;top:50%"></div>
             for each clickable point, then fill in panelData below. -->
        <div class="panel" id="panel-0">
          <!-- <img src="your-image.jpg" alt="Sourcing" /> -->
          <div class="panel-label"><h2>Sourcing</h2></div>
        </div>

        <!-- PANEL 2: Manufacturing -->
        <div class="panel" id="panel-1">
          <!-- <img src="your-image.jpg" alt="Manufacturing" /> -->
          <div class="panel-label"><h2>Manufacturing</h2></div>
        </div>

        <!-- PANEL 3: Shipping -->
        <div class="panel" id="panel-2">
          <!-- <img src="your-image.jpg" alt="Shipping" /> -->
          <div class="panel-label"><h2>Shipping</h2></div>
        </div>

        <!-- PANEL 4: Use -->
        <div class="panel" id="panel-3">
          <!-- <img src="your-image.jpg" alt="Use" /> -->
          <div class="panel-label"><h2>Use</h2></div>
        </div>

        <!-- PANEL 5: Afterlife -->
        <div class="panel" id="panel-4">
          <!-- <img src="your-image.jpg" alt="Afterlife" /> -->
          <div class="panel-label"><h2>Afterlife</h2></div>
        </div>

      </div><!-- /journey-track -->

      <nav id="journey-dots">
        <button class="jdot active" data-index="0"></button>
        <button class="jdot" data-index="1"></button>
        <button class="jdot" data-index="2"></button>
        <button class="jdot" data-index="3"></button>
        <button class="jdot" data-index="4"></button>
      </nav>
      <p id="scroll-nudge">scroll to continue →</p>
    </div>
  </div>


  <script>
/* =============================================
   PANEL HOTSPOT DATA
   Add an entry here for each hotspot you place.
   The key matches the data-modal attribute on the .hotspot div.
   ============================================= */
var panelData = {
  /* Example entries — replace with your real content:
  s1: {
    heading: 'Cotton farming',
    body: 'Your research and words here.'
  },
  m1: {
    heading: 'Vulcanisation',
    body: 'Your research and words here.'
  }
  */
};

/* =============================================
   SHOE PART DATA
   ============================================= */
var partData = {
  sole: {
    heading: 'The Sole',
    body: 'words research'
  },
  canvas: {
    heading: 'The Canvas',
    body: 'words words words'
  },
  laces: {
    heading: 'The Laces/Eyelets',
    body: 'more words and research and links to alternatives'
  }
};

/* =============================================
   MODAL
   ============================================= */
var modal    = document.getElementById('partModal');
var backdrop = document.getElementById('modalBackdrop');
var closeBtn = document.getElementById('modalClose');

function openModal(heading, body) {
  document.getElementById('modalHeading').textContent = heading;
  document.getElementById('modalBody').textContent    = body;
  modal.style.display    = 'block';
  backdrop.style.display = 'block';
}
function closeModal() {
  modal.style.display    = 'none';
  backdrop.style.display = 'none';
}
if (closeBtn) closeBtn.addEventListener('click', closeModal);
if (backdrop) backdrop.addEventListener('click', closeModal);
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

/* Wire up panel hotspots (delegated, works for dynamically added ones too) */
document.getElementById('journey-track').addEventListener('click', function(e) {
  var hs = e.target.closest('.hotspot');
  if (!hs) return;
  var key = hs.dataset.modal;
  var d   = panelData[key];
  if (d) openModal(d.heading, d.body);
});

/* =============================================
   CANVAS SHOE
   ============================================= */
var shoeCanvas = document.getElementById('shoeCanvas');
if (shoeCanvas) {
  var ctx = shoeCanvas.getContext('2d');
  var W = 0, H = 0, loadCount = 0;
  var layers = [
    { src: 'shoesole.png',   part: 'sole'   },
    { src: 'shoecanvas.png', part: 'canvas' },
    { src: 'shoelaces.png',  part: 'laces'  }
  ];
  function onAllLoaded() {
    ctx.clearRect(0, 0, W, H);
    for (var i = 0; i < layers.length; i++) {
      if (layers[i].img) ctx.drawImage(layers[i].img, 0, 0, W, H);
    }
  }
  for (var i = 0; i < layers.length; i++) {
    (function(layer) {
      var img = new Image();
      img.onload = function() {
        layer.img = img;
        if (W === 0 && img.naturalWidth > 0) {
          W = img.naturalWidth; H = img.naturalHeight;
          shoeCanvas.width = W; shoeCanvas.height = H;
        }
        var off = document.createElement('canvas');
        off.width = W || img.naturalWidth; off.height = H || img.naturalHeight;
        var offCtx = off.getContext('2d');
        offCtx.drawImage(img, 0, 0, off.width, off.height);
        layer.offCtx = offCtx;
        loadCount++;
        if (loadCount === layers.length) onAllLoaded();
      };
      img.onerror = function() { loadCount++; if (loadCount === layers.length) onAllLoaded(); };
      img.src = layer.src;
    })(layers[i]);
  }
  function getHit(e) {
    if (W === 0) return null;
    var rect = shoeCanvas.getBoundingClientRect();
    var x = Math.round((e.clientX - rect.left) * (W / rect.width));
    var y = Math.round((e.clientY - rect.top)  * (H / rect.height));
    for (var i = layers.length - 1; i >= 0; i--) {
      if (!layers[i].offCtx) continue;
      var px = layers[i].offCtx.getImageData(x, y, 1, 1).data;
      if (px[3] > 20) return layers[i].part;
    }
    return null;
  }
  shoeCanvas.addEventListener('click', function(e) {
    var hit = getHit(e);
    if (hit && partData[hit]) openModal(partData[hit].heading, partData[hit].body);
  });
  shoeCanvas.addEventListener('mousemove', function(e) {
    shoeCanvas.style.cursor = getHit(e) ? 'pointer' : 'default';
  });
}

/* =============================================
   HORIZONTAL SCROLL
   ============================================= */
var journey     = document.getElementById('journey');
var track       = document.getElementById('journey-track');
var nudge       = document.getElementById('scroll-nudge');
var dots        = document.querySelectorAll('.jdot');
var PANEL_COUNT = 5;
var LERP        = 0.08;
var currentX    = 0, targetX = 0, nudgeHidden = false;

function lerp(a, b, t) { return a + (b - a) * t; }
function getProgress() {
  if (!journey) return 0;
  var rect     = journey.getBoundingClientRect();
  var total    = journey.offsetHeight - window.innerHeight;
  var scrolled = Math.max(0, Math.min(total, -rect.top));
  return total > 0 ? scrolled / total : 0;
}
function tick() {
  var progress = getProgress();
  targetX  = progress * (PANEL_COUNT - 1) * window.innerWidth;
  currentX = lerp(currentX, targetX, LERP);
  if (Math.abs(currentX - targetX) < 0.3) currentX = targetX;
  if (track) track.style.transform = 'translateX(-' + currentX + 'px)';
  var activeIdx = Math.round(progress * (PANEL_COUNT - 1));
  for (var i = 0; i < dots.length; i++) {
    dots[i].classList.toggle('active', i === activeIdx);
  }
  if (!nudgeHidden && progress > 0.01) {
    nudgeHidden = true;
    if (nudge) nudge.classList.add('hide');
  }
  requestAnimationFrame(tick);
}
if (journey && track) requestAnimationFrame(tick);

for (var d = 0; d < dots.length; d++) {
  (function(dot, idx) {
    dot.addEventListener('click', function() {
      if (!journey) return;
      var total      = journey.offsetHeight - window.innerHeight;
      var journeyTop = journey.getBoundingClientRect().top + window.scrollY;
      window.scrollTo({ top: journeyTop + (idx / (PANEL_COUNT - 1)) * total, behavior: 'smooth' });
    });
  })(dots[d], d);
}
  </script>
</body>
</html>
